# CI/CD + Security Scanning
#
# Runs on every push and pull request to main.
#
# How CI/CD works in this project:
#   CI (tests + build + security scan) → GitHub Actions (this file)
#   CD backend  → Render auto-deploys on every push to main (Docker build)
#   CD frontend → Render auto-deploys on every push to main (static build)
#
# To run checks locally:
#   Backend tests:  cd backend && pytest
#   Frontend build: cd frontend && npm run build
#   Security scan:  trivy fs . --scanners vuln,secret,misconfig
#   Image scan:     trivy image ai-resume-analyzer-api

name: CI

on:
  workflow_dispatch:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── Backend tests ────────────────────────────────────────────────────────────
  backend:
    name: Backend tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        env:
          ENABLE_AI_FALLBACK: "true"
        run: pytest

  # ── Frontend build ───────────────────────────────────────────────────────────
  frontend:
    name: Frontend build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm install

      - name: Build
        env:
          VITE_API_BASE_URL: ${{ secrets.VITE_API_BASE_URL }}
        run: npm run build

  # ── Trivy filesystem scan ────────────────────────────────────────────────────
  # Scans the repository for:
  #   - vuln:      known CVEs in Python (requirements.txt) and npm (package-lock.json) deps
  #   - secret:    accidentally committed secrets, API keys, tokens
  #   - misconfig: Dockerfile and docker-compose misconfigurations
  trivy-fs:
    name: Trivy filesystem scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run Trivy filesystem scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          scanners: vuln,secret,misconfig
          severity: HIGH,CRITICAL
          exit-code: "1"          # fail the job if HIGH/CRITICAL found
          format: table

  # ── Trivy Docker image scan ──────────────────────────────────────────────────
  # Builds the backend Docker image and scans it for OS + library CVEs.
  trivy-image:
    name: Trivy image scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build backend Docker image
        run: docker build -t ai-resume-analyzer-api:ci ./backend

      - name: Run Trivy image scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: image
          image-ref: ai-resume-analyzer-api:ci
          scanners: vuln
          severity: HIGH,CRITICAL
          exit-code: "1"
          format: table
