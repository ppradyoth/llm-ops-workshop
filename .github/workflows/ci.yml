# CI/CD Reference
#
# This workflow is provided as a reference for workshop participants.
# It is not active on this account (GitHub Actions billing is disabled).
#
# How CI/CD works in this project:
#
#   CI (tests + build checks) → defined here, run via GitHub Actions on paid accounts
#   CD backend  → Render watches this GitHub repo and auto-deploys on every push to main
#   CD frontend → `npm run build && firebase deploy` run locally (or via this workflow on paid accounts)
#
# To run checks locally instead:
#   Backend: cd backend && source .venv/bin/activate && pytest
#   Frontend: cd frontend && npm run build

name: CI

on:
  workflow_dispatch:  # manual trigger only — remove this and uncomment below to enable automatic runs
  # push:
  #   branches: [main]
  # pull_request:
  #   branches: [main]

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install backend dependencies
        run: pip install -r requirements.txt

      - name: Run backend tests
        env:
          ENABLE_AI_FALLBACK: "true"
        run: pytest

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm install

      - name: Build frontend
        env:
          VITE_API_BASE_URL: ${{ secrets.VITE_API_BASE_URL }}
        run: npm run build

      # Uncomment to enable automatic Firebase deploy on push to main:
      # - name: Deploy to Firebase Hosting
      #   uses: FirebaseExtended/action-hosting-deploy@v0
